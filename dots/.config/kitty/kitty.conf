# Pixel Rice Kitty Config
font_family      Comics Tans Mono Nerd Font
font_size        12.0

# Sharp corners for that retro look
window_padding_width 10

# Retro Colors (Blueprint/BIOS Style)
foreground #FFFFFF
background #000000
selection_foreground #000000
selection_background #0000FF

# Cursor
cursor #0000FF
cursor_text_color #FFFFFF
cursor_shape block
shell_integration no-cursor

# No confirmation
confirm_os_window_close 0
