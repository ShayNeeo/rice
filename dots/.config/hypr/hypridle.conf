general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # lock before suspend.
    after_sleep_cmd = hyprctl dispatch dpms on  # immediately turn on display on resume
}

# Screen off (DPMS) - ALWAYS allowed after 5min physical inactivity
listener {
    timeout = 300                                # 5min
    on-timeout = bash -c 'loginctl lock-session; hyprctl dispatch dpms off'
    on-resume = hyprctl dispatch dpms on         # screen on when activity resumes
}

# Conditional suspend - only if NO active SSH (e.g. remote Cursor IDE)
# If SSH active -> stay awake. If no SSH -> suspend.
# Custom SSH port: add env = SSH_PORT,2222 to hypr custom/env.conf
listener {
    timeout = 900                                # 15min
    on-timeout = bash -c '~/.local/bin/check_ssh_active.sh || systemctl suspend'
}