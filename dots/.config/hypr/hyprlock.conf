general {
    disable_loading_bar = true
    hide_cursor = true
    ignore_empty_input = true
}

auth {
    pam = true
    module = "hyprlock"
    fingerprint:enabled = true
}

background {
    color = rgb(151621)
}

input-field {
    size = 420, 56
    outline_thickness = 2
    rounding = 6
    dots_center = true
    fade_on_empty = false
    placeholder_text = Enter password
    text_color = rgb(E0E2F0)
    font_color = rgb(E0E2F0)
    outer_color = rgb(4FD6FF)
    inner_color = rgb(1E2030)
    check_color = rgb(4FD6FF)
    fail_color = rgb(FF6B6B)
    position = 0, -80
    halign = center
    valign = center
}

label {
    text = Pixel rice - locked
    color = rgb(FFCC66)
    font_size = 22
    font_family = JetBrains Mono
    position = 0, -168
    halign = center
    valign = center
}

# Live clock (updates every second)
label {
    text = cmd[update:1000] date +%T
    color = rgb(4FD6FF)
    font_size = 34
    font_family = JetBrains Mono
    position = 0, 48
    halign = center
    valign = center
}

# Date
label {
    text = cmd[update:60000] date +%F
    color = rgb(A0A2B8)
    font_size = 14
    font_family = JetBrains Mono
    position = 0, 100
    halign = center
    valign = center
}
