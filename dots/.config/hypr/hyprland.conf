# Pixel Rice — Hyprland (cartoon-shell palette: matches Waybar / Rofi / Wofi)

# --- Monitors ---
monitor=,preferred,auto,1

# --- Programs ---
$terminal = ghostty
$browser = zen-browser
$menu = wofi --show drun
$cheatsheet = ~/.local/bin/cheatsheet.sh
$editor = notepadnext

# --- Environment (before exec-once so activation-environment sees theme vars) ---
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,Fusion
env = GTK_THEME,Adwaita:dark
env = GDK_THEME,Adwaita-dark
env = XDG_CURRENT_DESKTOP,Hyprland

# Fcitx5 Input Method (Vietnamese support) - Wayland Native
# Modern fcitx5 uses native Wayland protocol (text-input-v3)
# DO NOT set GTK_IM_MODULE, QT_IM_MODULE for Wayland compatibility
env = XMODIFIERS,@im=fcitx

# Allow Lotus server to act as virtual keyboard on Wayland
# Mirrors upstream fcitx5-lotus Hyprland guide; IM modules stay native
permission = fcitx5-lotus-server, keyboard, allow

# --- Exec-once ---
exec-once = waybar
exec-once = hyprpaper
exec-once = hypridle
exec-once = swaync
exec-once = wl-paste --type text --watch cliphist store
exec-once = fcitx5 -d --replace  # Vietnamese input method
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = udiskie --tray
exec-once = thunar-volman
exec-once = ~/.local/bin/eyeprotect.sh restore
exec-once = ~/.local/bin/battery-monitor.sh

# Prefer dark UI for libadwaita / portals / apps that read gsettings (needs gsettings-desktop-schemas)
exec-once = bash -c 'gsettings set org.gnome.desktop.interface color-scheme prefer-dark 2>/dev/null || true'
# Propagate theme vars to D-Bus-activated apps (file dialog helpers, etc.)
exec-once = bash -c 'dbus-update-activation-environment --systemd GTK_THEME GDK_THEME QT_QPA_PLATFORMTHEME XDG_CURRENT_DESKTOP 2>/dev/null || true'

# --- Input ---
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    
    # Touchpad (Natural/Inverted Scrolling)
    touchpad {
        natural_scroll = yes
    }
}

gestures {
    # 3-finger horizontal swipe to switch workspaces (Hyprland 0.51+ syntax)
    gesture = 3, horizontal, workspace
}

# --- Appearance (cartoon-shell: cyan accent, card rounding; still no blur) ---
general {
    gaps_in = 3
    gaps_out = 6
    border_size = 2

    col.active_border = rgb(4FD6FF) rgb(FFCC66) 90deg
    col.inactive_border = rgb(2A2C3C)

    layout = dwindle
    resize_on_border = false
    allow_tearing = true  # Performance boost for games/videos
}

decoration {
    rounding = 6

    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }

    dim_inactive = false
    dim_strength = 0
}

animations {
    enabled = false  # Instant switching = max performance
}

master {
    new_status = slave
    new_on_top = false
    mfact = 0.55
}

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2 # 0=mouse, 2=always right/bottom. 2 is usually more intuitive for spiraling.
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = rgb(151621)
    force_default_wallpaper = 0
    vfr = true  # Variable frame rate for power saving
    vrr = 3  # Variable refresh rate support for gaming
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# --- Keybindings (Optimized for Coder/Finance) ---
$mainMod = SUPER

# Core Applications
bind = $mainMod, Return, exec, $terminal       # Terminal (Fastest)
bind = $mainMod, T, exec, $terminal            # Terminal (Legacy)
bind = $mainMod, W, exec, $browser             # Web Browser
bind = $mainMod, F, exec, thunar               # File Manager (Files)
bind = $mainMod, E, exec, $editor              # Text Editor (NotepadNext)
bind = $mainMod, C, exec, galculator           # Calculator (Finance)
bind = $mainMod SHIFT, C, exec, hyprpicker -a  # Color Picker (Coder)
bind = $mainMod, O, exec, cursor               # IDE (Open/Code)

# Launchers & Utils
bind = $mainMod, Space, exec, $menu              # App Launcher
bind = $mainMod, slash, exec, $cheatsheet        # Cheatsheet
bind = $mainMod SHIFT, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy  # Clipboard

# Window Management
bind = $mainMod, Q, killactive,                  # Close Window
bind = $mainMod SHIFT, F, fullscreen             # Fullscreen
bind = $mainMod, V, togglefloating,              # Toggle Floating
bind = $mainMod, S, togglesplit,                 # Split Toggle (Master/Dwindle)
bind = $mainMod, P, pseudo,                      # Pseudo Tile

# Focus (Vim Style)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move Window
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Resize Window (Control + Vim/Arrow)
bind = $mainMod CTRL, H, resizeactive, -20 0
bind = $mainMod CTRL, L, resizeactive, 20 0
bind = $mainMod CTRL, K, resizeactive, 0 -20
bind = $mainMod CTRL, J, resizeactive, 0 20
bind = $mainMod CTRL, left, resizeactive, -20 0
bind = $mainMod CTRL, right, resizeactive, 20 0
bind = $mainMod CTRL, up, resizeactive, 0 -20
bind = $mainMod CTRL, down, resizeactive, 0 20

# Workspaces (1-9 & Numpad)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Numpad Workspaces (Finance/Multitask)
bind = $mainMod, KP_End, workspace, 1
bind = $mainMod, KP_Down, workspace, 2
bind = $mainMod, KP_Next, workspace, 3
bind = $mainMod, KP_Left, workspace, 4
bind = $mainMod, KP_Begin, workspace, 5
bind = $mainMod, KP_Right, workspace, 6
bind = $mainMod, KP_Home, workspace, 7
bind = $mainMod, KP_Up, workspace, 8
bind = $mainMod, KP_Prior, workspace, 9

# Move to Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Numpad Move to Workspace
bind = $mainMod SHIFT, KP_End, movetoworkspace, 1
bind = $mainMod SHIFT, KP_Down, movetoworkspace, 2
bind = $mainMod SHIFT, KP_Next, movetoworkspace, 3
bind = $mainMod SHIFT, KP_Left, movetoworkspace, 4
bind = $mainMod SHIFT, KP_Begin, movetoworkspace, 5
bind = $mainMod SHIFT, KP_Right, movetoworkspace, 6
bind = $mainMod SHIFT, KP_Home, movetoworkspace, 7
bind = $mainMod SHIFT, KP_Up, movetoworkspace, 8
bind = $mainMod SHIFT, KP_Prior, movetoworkspace, 9

# Scroll Workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mouse Window Move/Resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- OSD & System Controls ---

# Audio (OSD)
bind = , XF86AudioRaiseVolume, exec, ~/.local/bin/osd.sh volume up
bind = , XF86AudioLowerVolume, exec, ~/.local/bin/osd.sh volume down
bind = , XF86AudioMute, exec, ~/.local/bin/osd.sh volume mute
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness (OSD)
bind = , XF86MonBrightnessUp, exec, ~/.local/bin/osd.sh brightness up
bind = , XF86MonBrightnessDown, exec, ~/.local/bin/osd.sh brightness down

# Keyboard Backlight (OSD)
bind = , XF86KbdLightOnOff, exec, ~/.local/bin/osd.sh kbd_backlight cycle
bind = , XF86KbdBrightnessUp, exec, ~/.local/bin/osd.sh kbd_backlight up
bind = , XF86KbdBrightnessDown, exec, ~/.local/bin/osd.sh kbd_backlight down

# Power Profiles (OSD)
bind = $mainMod SHIFT, P, exec, ~/.local/bin/osd.sh power performance
bind = $mainMod CTRL, P, exec, ~/.local/bin/osd.sh power balanced
bind = $mainMod ALT, P, exec, ~/.local/bin/osd.sh power power-saver

# Eye Protection
bind = $mainMod, Y, exec, ~/.local/bin/eyeprotect.sh

# DNS / WARP–NextDNS toggle
bind = $mainMod SHIFT, W, exec, ~/.local/bin/warp-nextdns-toggle.sh

# Screen Recording
bind = $mainMod ALT, R, exec, ~/.local/bin/screenrecord.sh

# Session
bind = $mainMod, Backspace, exec, loginctl lock-session
bind = $mainMod SHIFT, Backspace, exec, systemctl suspend
bind = $mainMod SHIFT, M, exec, hyprctl reload

# Screenshot
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, Print, exec, grim - | wl-copy

# Scratchpad
bind = $mainMod, grave, togglespecialworkspace, scratchpad
bind = $mainMod SHIFT, grave, movetoworkspace, special:scratchpad

# --- Expert Workflows ---
bind = $mainMod, N, exec, $terminal -e nmtui
bind = $mainMod SHIFT, N, exec, nm-connection-editor
bind = $mainMod, B, exec, blueman-manager
bind = $mainMod SHIFT, B, exec, $terminal -e bluetoothctl
bind = $mainMod, I, exec, $terminal -e btop

# --- User Custom Configs (do not edit from installer) ---
# These files live in ~/.config/hypr/custom/ and are created only if missing.
# The installer now preserves them (rsync --exclude='custom').
source = ~/.config/hypr/custom/monitors.conf
source = ~/.config/hypr/custom/keybinds.conf
source = ~/.config/hypr/custom/autostart.conf
source = ~/.config/hypr/custom/env.conf
